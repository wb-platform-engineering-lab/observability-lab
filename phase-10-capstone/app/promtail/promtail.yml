server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host:             unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label:  service
      - source_labels: [__meta_docker_container_name]
        regex:         /(.*)
        target_label:  container
      - source_labels: [__meta_docker_container_log_stream]
        target_label:  stream
      # Only collect logs from containers in this Compose project
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex:         app
        action:        keep

    pipeline_stages:
      # Parse the JSON log lines emitted by the api's JSONFormatter
      - json:
          expressions:
            level:        level
            event_type:   event_type
            error_reason: error_reason
            trace_id:     trace_id
            span_id:      span_id
            env:          env

      # Promote bounded-cardinality fields to Loki labels.
      # trace_id and span_id are NOT promoted — they would create millions
      # of unique label combinations (Phase 8 lesson).  Grafana's Loki
      # derivedFields config handles the Log → Trace link without labels.
      - labels:
          level:
          event_type:
          env:

      # Drop DEBUG-level logs — too noisy in production
      - drop:
          source:     level
          expression: "DEBUG"
