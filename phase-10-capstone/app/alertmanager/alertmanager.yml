global:
  resolve_timeout: 5m

route:
  receiver: production
  group_by: [alertname, job, slo]
  group_wait:      15s
  group_interval:  5m
  repeat_interval: 4h

  routes:
    - matchers:
        - severity = none
      receiver: "null"

    # SLO fast burn — critical, short repeat interval
    - matchers:
        - slo = availability
        - severity = critical
      receiver: production
      group_wait:      10s
      group_interval:  5m
      repeat_interval: 15m

    # SLO slow burn — warning, longer repeat
    - matchers:
        - slo = availability
        - severity = warning
      receiver: production
      group_wait:      30s
      repeat_interval: 4h

    # Infrastructure critical
    - matchers:
        - severity = critical
      receiver: production
      group_wait:      10s
      repeat_interval: 15m

inhibit_rules:
  - source_matchers:
      - alertname = LumioServiceDown
    target_matchers:
      - alertname =~ "LumioHigh.*|LumioElevated.*|SLO.*"
    equal: [job]

receivers:
  - name: "null"

  - name: production
    webhook_configs:
      - url: "http://webhook:5001/webhook"
        send_resolved: true
