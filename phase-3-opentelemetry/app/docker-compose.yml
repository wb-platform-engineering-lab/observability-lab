services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - OTEL_ENDPOINT=otelcol:4317
      - ENVIRONMENT=development
    depends_on:
      - otelcol

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.105.0
    ports:
      - "4317:4317"    # OTLP gRPC — receives from the app
      - "4318:4318"    # OTLP HTTP — alternative ingestion
      - "8889:8889"    # Prometheus scrape endpoint — Prometheus pulls from here
    volumes:
      - ./otelcol/config.yml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.5.0
    ports:
      - "3200:3200"    # Grafana Tempo datasource
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo.yml

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=lumio
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
