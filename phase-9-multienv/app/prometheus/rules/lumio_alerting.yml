# Alerting rules — multi-environment version
#
# Rules here fire for BOTH dev and prod.  The env label on each alert lets
# Alertmanager route them differently:
#
#   env=dev  → webhook-dev (low urgency, long repeat interval)
#   env=prod → webhook-prod (high urgency, short repeat interval, pages on-call)
#
# The alert EXPRESSIONS are identical between environments — only the
# routing and notification behaviour differs.  This is the recommended
# pattern: keep alert logic centralised, configure urgency in Alertmanager.
#
# Exception: the thresholds are the same here too.  In practice you may want
# to relax thresholds for dev (e.g. allow 10% error rate before firing) but
# tighten them for prod (fire at 1%).  Challenge 6 in the README walks through
# adding per-env threshold overrides using an 'unless' inhibition pattern.
#
# Summary format: "[env] Alert name" makes the environment visible in the
# first line of every notification — especially important when multiple envs
# feed into the same Slack channel or PagerDuty service.

groups:
  - name: lumio.api.alerting
    rules:

      - alert: LumioServiceDown
        expr: up{job="lumio-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "[{{ $labels.env }}] Lumio API is down"
          description: >
            The Prometheus scrape target {{ $labels.instance }}
            (env={{ $labels.env }}) has been unreachable for more than 1 minute.

      - alert: LumioHighErrorRate
        expr: >
          job_env:lumio_http_requests_error_ratio:rate5m{job="lumio-api"} > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "[{{ $labels.env }}] Lumio error rate above 5%"
          description: >
            {{ $labels.job }} (env={{ $labels.env }}) error rate is
            {{ $value | humanizePercentage }} over the last 5 minutes.

      - alert: LumioElevatedErrorRate
        expr: >
          job_env:lumio_http_requests_error_ratio:rate5m{job="lumio-api"} > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "[{{ $labels.env }}] Lumio error rate above 1%"
          description: >
            {{ $labels.job }} (env={{ $labels.env }}) error rate is
            {{ $value | humanizePercentage }} over the last 5 minutes.

      - alert: LumioHighP95Latency
        expr: >
          job_env:lumio_http_request_duration_seconds:p95rate5m{job="lumio-api"} > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "[{{ $labels.env }}] Lumio P95 latency above 500ms"
          description: >
            P95 latency for {{ $labels.job }} (env={{ $labels.env }}) is
            {{ $value | humanizeDuration }} (threshold: 500ms).

      - alert: LumioWatchdog
        expr: vector(1)
        labels:
          severity: none
        annotations:
          summary: "Alerting pipeline is alive"
          description: >
            This alert always fires.  If it stops appearing in the webhook
            receiver the alerting pipeline has broken.
