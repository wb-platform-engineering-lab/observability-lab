global:
  scrape_interval:     15s
  evaluation_interval: 15s   # how often alerting rules are evaluated

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: lumio-api
    static_configs:
      - targets: ["api:8000"]
