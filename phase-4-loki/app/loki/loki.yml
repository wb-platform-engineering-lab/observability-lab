auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store:        tsdb
      object_store: filesystem
      schema:       v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples:      true
  reject_old_samples_age:  168h
  # Keep cardinality low — same discipline as Prometheus labels
  max_label_names_per_series:  15
  max_label_value_length:      2048

compactor:
  working_directory: /loki/compactor

# Retention: keep logs for 72 hours in this lab
# In production, tune per environment (dev=7d, prod=30d+)
table_manager:
  retention_deletes_enabled: true
  retention_period: 72h
