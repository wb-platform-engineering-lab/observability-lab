global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: default
  routes:
    - matchers:
        - alertname = "LumioWatchdog"
      receiver: "null"
    - matchers:
        - severity = "critical"
      receiver: default
      group_wait: 10s

receivers:
  - name: "null"
  - name: default
    webhook_configs:
      - url: "http://webhook:5001/alerts"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - alertname = "LumioServiceDown"
    target_matchers:
      - alertname =~ "LumioHigh.*"
    equal: ["team"]
