groups:
  - name: lumio.api
    interval: 15s
    rules:
      - alert: LumioServiceDown
        expr: up{job="lumio-api"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Lumio API is unreachable"
          description: "Prometheus cannot scrape the Lumio API."

      - alert: LumioHighErrorRate
        expr: |
          (
            sum(rate(lumio_http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(lumio_http_requests_total[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High HTTP error rate on Lumio API"
          description: "Error rate is {{ $value | humanizePercentage }}."

      - alert: LumioWatchdog
        expr: vector(1)
        labels:
          severity: none
          team: platform
        annotations:
          summary: "Alerting pipeline heartbeat"
