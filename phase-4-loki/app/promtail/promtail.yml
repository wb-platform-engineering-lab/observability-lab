server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    # Docker service discovery — reads log streams directly from the Docker daemon.
    # Requires /var/run/docker.sock mounted read-only.
    docker_sd_configs:
      - host:             unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # Use the Docker Compose service name as the primary label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label:  service

      # Also keep the container name
      - source_labels: [__meta_docker_container_name]
        regex:         /(.*)
        target_label:  container

      # Log stream: stdout or stderr
      - source_labels: [__meta_docker_container_log_stream]
        target_label:  stream

      # Only scrape containers in this compose project
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex:         app   # matches the directory name (docker compose project name)
        action:        keep

    pipeline_stages:
      # Parse the JSON log lines emitted by the app
      - json:
          expressions:
            level:       level
            event_type:  event_type
            error_reason: error_reason

      # Promote parsed fields to Loki labels — keep cardinality low
      # Only promote fields with bounded value sets
      - labels:
          level:
          event_type:

      # Drop DEBUG logs to reduce volume (comment out to keep all levels)
      - drop:
          expression: '.*"level":"DEBUG".*'
