apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    isDefault: false
    editable: false
    jsonData:
      # -----------------------------------------------------------------------
      # Trace → Logs
      # When viewing a trace in Grafana, a "Logs" button appears on each span.
      # Clicking it runs this LogQL query against Loki, scoped to the
      # trace's time window and filtered by trace_id.
      # -----------------------------------------------------------------------
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: false
        filterBySpanID: false
        customQuery: true
        query: '{service="api"} | json | trace_id = "${__trace.traceId}"'

      # -----------------------------------------------------------------------
      # Trace → Metrics
      # When viewing a trace, a "Metrics" button opens these Prometheus queries
      # scoped to the span's time window (+/- 2 minutes).
      # -----------------------------------------------------------------------
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: "-2m"
        spanEndTimeShift: "2m"
        tags:
          - key: service.name
            value: service
        queries:
          - name: Request rate
            query: sum(rate(lumio_http_requests_total[5m])) by (endpoint)
          - name: P95 latency
            query: histogram_quantile(0.95, sum by(le)(rate(lumio_http_request_duration_seconds_bucket[5m])))
          - name: Error rate
            query: 100 * sum(rate(lumio_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(lumio_http_requests_total[5m]))

      nodeGraph:
        enabled: true
      search:
        hide: false

      # Enable the Loki search tab inside the Trace view
      lokiSearch:
        datasourceUid: loki
