server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host:             unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label:  service
      - source_labels: [__meta_docker_container_name]
        regex:         /(.*)
        target_label:  container
      - source_labels: [__meta_docker_container_log_stream]
        target_label:  stream
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex:         app
        action:        keep

    pipeline_stages:
      - json:
          expressions:
            level:        level
            event_type:   event_type
            error_reason: error_reason
            trace_id:     trace_id    # extracted but NOT promoted to a label
            span_id:      span_id     # high-cardinality — stays in log content

      # Only bounded-cardinality fields become labels
      - labels:
          level:
          event_type:

      # trace_id and span_id remain as log content.
      # Grafana's Loki derivedFields config extracts trace_id from each log
      # line and creates a clickable link to Tempo — no label needed.
